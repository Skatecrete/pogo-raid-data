name: update-spawns

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-spawns:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install playwright==1.40.0
        playwright install chromium
        
    - name: Run Shungo forms scraper (first)
      run: python scrape_shungo_forms.py
      
    - name: Run Shungo spawns scraper (second)
      run: python scrape_shungo_spawns.py
      
    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        git pull origin main --rebase || true
        
        git add shungo_forms.json spawns.json
        
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "Auto-update spawns and forms - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        fi