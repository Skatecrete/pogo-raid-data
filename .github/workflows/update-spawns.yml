name: update-spawns

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-spawns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          
      - name: Run spawn scraper (includes form scraping)
        run: python scrape_shungo_spawns.py
        
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add spawns.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update spawns $(date +'%Y-%m-%d %H:%M:%S')"
          git push
