name: Auto-Retry Failed Workflows

on:
  workflow_run:
    workflows: ["Update Raids"]
    types:
      - completed

jobs:
  retry:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Check if already a retry (prevent infinite loop)
        id: check_retry
        run: |
          RUN_NAME="${{ github.event.workflow_run.name }}"
          if [[ "$RUN_NAME" == *"Retry"* ]]; then
            echo "skip_retry=true" >> $GITHUB_OUTPUT
            echo "Already a retry run. Skipping to prevent loop."
          else
            echo "skip_retry=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Wait before retry
        if: steps.check_retry.outputs.skip_retry == 'false'
        run: sleep 60
        
      - name: Check failure type (runner error vs script error)
        id: check_error
        if: steps.check_retry.outputs.skip_retry == 'false'
        run: |
          FAILED_RUN_ID="${{ github.event.workflow_run.id }}"
          
          # Check if failure was runner acquisition error
          if gh api repos/${{ github.repository }}/actions/runs/$FAILED_RUN_ID/logs 2>&1 | grep -q "The job was not acquired by Runner of type hosted"; then
            echo "is_runner_error=true" >> $GITHUB_OUTPUT
            echo "Runner acquisition failure detected. Will retry."
          else
            echo "is_runner_error=false" >> $GITHUB_OUTPUT
            echo "Not a runner error. Will still retry once."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Retry the failed workflow
        if: steps.check_retry.outputs.skip_retry == 'false'
        run: |
          echo "Retrying Update Raids workflow..."
          gh workflow run "Update Raids.yml"
          echo "Retry triggered. Check the new run."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Send notification on persistent failure
        if: steps.check_retry.outputs.skip_retry == 'false' && steps.check_error.outputs.is_runner_error == 'false'
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"⚠️ **UPDATE RAIDS FAILED** ⚠️\nWorkflow: ${{ github.event.workflow_run.html_url }}\nReason: Script error (not runner related)\nManual intervention may be required.\"
            }" \
            "https://discord.com/api/webhooks/1489355050689232986/DCRk5aPaslfBAytB1_Wkel5B9uvIC5uxfLWNfJ1CpnncZOJsPdo4KyAcEttFiQrIvXcW"
