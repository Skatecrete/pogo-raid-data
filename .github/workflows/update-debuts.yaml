name: update-debuts

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-debuts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        
    - name: Run debut scraper
      run: python scrape_debuts.py

    - name: Commit and push if changes
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        # Fetch latest changes from remote
        git fetch origin main
        
        # Stash any local changes (including scraper output)
        git stash || true
        
        # Reset to latest remote state
        git reset --hard origin/main
        
        # Apply stashed changes (our new debuts.json)
        git stash pop || true
        
        # Check if debuts.json actually changed
        if git diff --quiet debuts.json; then
          echo "No changes to commit"
        else
          git add debuts.json
          git commit -m "Update debuts data - $(date +'%Y-%m-%d %H:%M:%S')"
          
          # Push with retry on conflict
          for i in 1 2 3; do
            git push origin main && break
            echo "Push attempt $i failed, pulling latest changes..."
            git pull origin main --rebase
            sleep 5
          done
        fi