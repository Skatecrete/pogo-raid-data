name: update-raids

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-raids:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run scraper
      run: python scrape_snacknap.py
      
    - name: Commit and push if changes
      id: commit
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add current_raids.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          git commit -m "Update raids data"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification
      if: steps.commit.outputs.changed == 'true'
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        if [ -f discord_message.txt ]; then
          MESSAGE=$(cat discord_message.txt)
          # Escape the message for JSON
          ESCAPED_MESSAGE=$(echo "$MESSAGE" | sed 's/"/\\"/g')
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$ESCAPED_MESSAGE\"}" \
            "$DISCORD_WEBHOOK"
          rm discord_message.txt
        else
          echo "No discord_message.txt found, skipping notification"
        fi        if git diff --staged --quiet; then
          echo "No changes to commit"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          git commit -m "Update raids data"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification
      if: steps.commit.outputs.changed == 'true'
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        if [ -f discord_message.txt ]; then
          MESSAGE=$(cat discord_message.txt)
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"$MESSAGE\"}" \
            "$DISCORD_WEBHOOK"
          rm discord_message.txt
        else
          echo "No discord_message.txt found, skipping notification"
        fi
