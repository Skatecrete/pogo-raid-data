name: update-raids

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-raids:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        
    - name: Run scraper
      run: python scrape_snacknap.py
      
    - name: Commit and push if changes
      id: commit
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        git pull origin main --rebase || true
        
        if git diff --quiet current_raids.json; then
          echo "No changes to commit"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          git add current_raids.json
          git commit -m "Update raids data - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification
      if: steps.commit.outputs.changed == 'true'
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        MESSAGE="Raid rotation updated! Check the app for new raids."
        curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"$MESSAGE\"}" "$DISCORD_WEBHOOK"
