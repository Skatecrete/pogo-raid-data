name: update-raids

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-raids:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        
    - name: Run SnackNap scraper
      run: python scrape_snacknap.py
    
    - name: Run Gigantamax Event scraper
      run: python scrape_gigantamax_events.py
      
    - name: Compare and generate raid changes
      id: changes
      run: |
        OUTPUT=$(python compare_raids.py)
        echo "has_changes=$OUTPUT" >> $GITHUB_OUTPUT
        
    - name: Check if changes file has content
      id: verify_changes
      run: |
        CHANGES=$(cat raid_changes.txt)
        if [ "$CHANGES" = "No changes detected" ]; then
          echo "verified=false" >> $GITHUB_OUTPUT
        else
          echo "verified=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push if changes
      id: commit
      if: steps.changes.outputs.has_changes == 'true' && steps.verify_changes.outputs.verified == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        git pull origin main --rebase || true
        
        git add scrapedduck_old.json current_raids.json current_raids_last_sent.json pending_removals.json
        
        if ! git diff --cached --quiet; then
          git commit -m "Update raids and shadow images - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "committed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification with raid changes
      if: steps.verify_changes.outputs.verified == 'true'
      run: |
        CHANGES=$(cat raid_changes.txt)
        ESCAPED_CHANGES=$(python -c 'import json,sys; print(json.dumps(sys.stdin.read()))' <<< "$CHANGES")
        
        curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🔁 **RAID ROTATION UPDATE** 🔁\",
            \"embeds\": [{
              \"title\": \"📅 $(date +'%B %d, %Y')\",
              \"description\": $ESCAPED_CHANGES,
              \"color\": 16753920,
              \"footer\": {\"text\": \"PokeSpawn Raid Tracker\"}
            }]
          }" \
          "https://discord.com/api/webhooks/1489355050689232986/DCRk5aPaslfBAytB1_Wkel5B9uvIC5uxfLWNfJ1CpnncZOJsPdo4KyAcEttFiQrIvXcW"
