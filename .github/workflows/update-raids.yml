name: Update Raid Data from Snack Nap

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-raids:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Changed from v3 to v4
      
      - name: Set up Python
        uses: actions/setup-python@v5  # Changed from v4 to v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Run Snack Nap scraper
        run: python scrape_snacknap.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add current_raids.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-update raid data from Snack Nap $(date +'%Y-%m-%d')"
          git push
