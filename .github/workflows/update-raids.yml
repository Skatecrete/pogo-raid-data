name: update-raids

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-raids:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        attempt: [1, 2, 3]
    continue-on-error: ${{ matrix.attempt < 3 }}

    steps:
    - name: Wait before retry (only for attempts 2 and 3)
      if: matrix.attempt > 1
      run: |
        echo "Retry attempt #${{ matrix.attempt }} after runner failure"
        sleep 30
      
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        
    - name: Create old files if not exist
      run: |
        if [ ! -f current_raids_old.json ]; then
          echo '{"last_updated": "", "tier1": [], "tier3": [], "tier5": [], "mega": [], "dynamax_tier1": [], "dynamax_tier2": [], "dynamax_tier3": [], "dynamax_tier5": [], "gigantamax": []}' > current_raids_old.json
        fi
        if [ ! -f scrapedduck_old.json ]; then
          echo '[]' > scrapedduck_old.json
        fi
      
    - name: Save current raids.json for comparison
      run: |
        cp current_raids.json current_raids_old.json
        
    - name: Run SnackNap scraper
      run: python scrape_snacknap.py

    - name: Run Gigantamax Event scraper
      run: python scrape_gigantamax_events.py

    - name: Compare and generate raid changes
      id: changes
      run: |
        OUTPUT=$(python compare_raids.py)
        echo "has_changes=$OUTPUT" >> $GITHUB_OUTPUT
        
    - name: Commit and push if changes
      id: commit
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
    
        # Fetch latest
        git fetch origin main
    
        # Hard reset to remote (discard local conflicts)
        git reset --hard origin/main
    
        # Add all tracking files
        git add scrapedduck_old.json
        git add current_raids.json
        git add current_raids_last_sent.json
        git add pending_removals.json
        git add raid_changes.txt
        git add shadow_images/ 2>/dev/null || true
        git add shadow_images.json 2>/dev/null || true
    
        # Check if there are actual changes to commit
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
    
        # Commit
        git commit -m "Update raids and shadow images - $(date +'%Y-%m-%d %H:%M:%S')"
    
        # Push
        git push origin main
        echo "committed=true" >> $GITHUB_OUTPUT
        
    - name: Send Discord notification with raid changes
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        CHANGES=$(cat raid_changes.txt)
        ESCAPED_CHANGES=$(python -c 'import json,sys; print(json.dumps(sys.stdin.read()))' <<< "$CHANGES")
        
        curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🔁 **RAID ROTATION UPDATE** 🔁\",
            \"embeds\": [{
              \"title\": \"📅 $(date +'%B %d, %Y')\",
              \"description\": $ESCAPED_CHANGES,
              \"color\": 16753920,
              \"footer\": {\"text\": \"PokeSpawn Raid Tracker\"}
            }]
          }" \
          "https://discord.com/api/webhooks/1489355050689232986/DCRk5aPaslfBAytB1_Wkel5B9uvIC5uxfLWNfJ1CpnncZOJsPdo4KyAcEttFiQrIvXcW"
