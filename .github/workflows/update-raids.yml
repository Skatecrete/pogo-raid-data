name: update-raids

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-raids:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        
    - name: Create old files if not exist
      run: |
        if [ ! -f current_raids_old.json ]; then
          echo '{"last_updated": "", "tier1": [], "tier3": [], "dynamax_tier1": [], "dynamax_tier2": [], "dynamax_tier3": [], "gigantamax": []}' > current_raids_old.json
        fi
        if [ ! -f scrapedduck_old.json ]; then
          echo '[]' > scrapedduck_old.json
        fi
        
    - name: Save current raids.json for comparison
      run: |
        cp current_raids.json current_raids_old.json
        
    - name: Run scraper
      run: python scrape_snacknap.py
      
    - name: Fix Mega/Gigantamax image URLs
      run: python fix_raid_image_urls.py
      
    - name: Compare and generate raid changes
      id: changes
      run: |
        python compare_raids.py
        
    - name: Check if changes exist
      id: has_changes
      run: |
        CHANGES=$(cat raid_changes.txt)
        if [ "$CHANGES" != "No changes detected" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push if changes
      id: commit
      if: steps.has_changes.outputs.has_changes == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        git pull origin main --rebase || true
        
        git add scrapedduck_old.json
        git add current_raids.json
        git add images/
        
        if ! git diff --cached --quiet; then
          git commit -m "Update raids data - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "committed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification with raid changes
      if: steps.has_changes.outputs.has_changes == 'true'
      run: |
        CHANGES=$(cat raid_changes.txt)
        ESCAPED_CHANGES=$(python -c 'import json,sys; print(json.dumps(sys.stdin.read()))' <<< "$CHANGES")
        
        curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🔁 **RAID ROTATION UPDATE** 🔁\",
            \"embeds\": [{
              \"title\": \"📅 $(date +'%B %d, %Y')\",
              \"description\": $ESCAPED_CHANGES,
              \"color\": 16753920,
              \"footer\": {\"text\": \"PokeSpawn Raid Tracker\"}
            }]
          }" \
          "https://discord.com/api/webhooks/1489355050689232986/DCRk5aPaslfBAytB1_Wkel5B9uvIC5uxfLWNfJ1CpnncZOJsPdo4KyAcEttFiQrIvXcW"
