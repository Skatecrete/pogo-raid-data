name: update-raids

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Add retry attempt tracking
run-name: Update Raids (Attempt ${{ github.run_attempt }})

jobs:
  update-raids:
    runs-on: ubuntu-latest
    # Add timeout to prevent indefinite waiting on runner acquisition
    timeout-minutes: 15
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install requests==2.31.0
        pip install beautifulsoup4==4.12.2
        
    - name: Run SnackNap scraper with retry
      run: |
        for i in 1 2 3; do
          echo "SnackNap scraper attempt $i/3..."
          if python scrape_snacknap.py; then
            echo "SnackNap scraper success!"
            break
          fi
          if [ $i -eq 3 ]; then
            echo "SnackNap scraper failed after 3 attempts"
            exit 1
          fi
          echo "Attempt $i failed, waiting 30 seconds..."
          sleep 30
        done
    
    - name: Run Gigantamax Event scraper with retry
      run: |
        for i in 1 2 3; do
          echo "Gigantamax scraper attempt $i/3..."
          if python scrape_gigantamax_events.py; then
            echo "Gigantamax scraper success!"
            break
          fi
          if [ $i -eq 3 ]; then
            echo "Gigantamax scraper failed after 3 attempts"
            exit 1
          fi
          echo "Attempt $i failed, waiting 30 seconds..."
          sleep 30
        done
      
    - name: Compare and generate raid changes
      id: changes
      run: |
        python compare_raids.py
        CHANGES=$(cat raid_changes.txt)
        if [ "$CHANGES" = "No changes detected" ]; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push if changes
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        git pull origin main --rebase || true
        
        git add scrapedduck_old.json current_raids.json
        
        if ! git diff --cached --quiet; then
          git commit -m "Update raids - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "committed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification with raid changes
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        CHANGES=$(cat raid_changes.txt)
        ESCAPED_CHANGES=$(python -c 'import json,sys; print(json.dumps(sys.stdin.read()))' <<< "$CHANGES")
        
        curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🔁 **RAID ROTATION UPDATE** 🔁\",
            \"embeds\": [{
              \"title\": \"📅 $(date +'%B %d, %Y')\",
              \"description\": $ESCAPED_CHANGES,
              \"color\": 16753920,
              \"footer\": {\"text\": \"PokeSpawn Raid Tracker\"}
            }]
          }" \
          "https://discord.com/api/webhooks/1489355050689232986/DCRk5aPaslfBAytB1_Wkel5B9uvIC5uxfLWNfJ1CpnncZOJsPdo4KyAcEttFiQrIvXcW"